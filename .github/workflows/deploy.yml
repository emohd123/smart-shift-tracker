name: Deploy to Hostinger
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Build
      run: npm run build
    - name: Check dist contents
      run: ls -la ./dist/
    - name: Deploy to Hostinger via FTPS
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: 191.101.230.56
        username: u649563468
        password: ${{ secrets.FTP_PASSWORD }}
        port: 65002
        protocol: ftps
        local-dir: ./dist/
        server-dir: /public_html/smart/
        dangerous-clean-slate: false
