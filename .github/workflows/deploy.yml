name: Deploy to Hostinger
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Build
      run: npm run build
    - name: Deploy to Hostinger via SFTP
      env:
        FTP_PASS: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -u u649563468,$FTP_PASS sftp://191.101.230.56:65002 -e "
        set sftp:auto-confirm yes
        set ssl:verify-certificate no
        set net:max-retries 3
        set net:timeout 30
        set cmd:fail-exit no
        mkdir -p /home/u649563468/public_html/smart/
        mirror -R --overwrite -x .git -x .github -x index.html ./dist/ /home/u649563468/public_html/smart/
        put -O /home/u649563468/public_html/smart/ ./dist/index.html
        bye
        "
