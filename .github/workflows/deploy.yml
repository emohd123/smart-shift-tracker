name: Deploy to Hostinger
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
    - name: Install dependencies
      run: npm ci
    - name: Build
      run: npm run build
    - name: Deploy via SSH/rsync
      uses: burnett01/rsync-deployments@7.0.1
      with:
        switches: -avzr --delete
        path: dist/
        remote_path: /home/u649563468/domains/onestoneads.com/public_html/smart/
        remote_host: 191.101.230.56
        remote_port: 65002
        remote_user: u649563468
        remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

