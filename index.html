
<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartShift Tracker - Workforce Management</title>
    <meta name="description" content="SmartShift Tracker - Track Time, Get Certified, Get Paid. Bahrain's leading workforce management platform for promoters and companies." />
    <meta name="author" content="Lovable" />
    <meta property="og:image" content="/og-image.png" />
    <!-- Content Security Policy: Allow WebSocket connections to Supabase for real-time updates -->
    <meta http-equiv="Content-Security-Policy" content="connect-src 'self' https: wss: ws: https://*.supabase.co wss://*.supabase.co ws://*.supabase.co https://maps.googleapis.com https://*.googleapis.com;" />
    <!-- Google Maps API with a working API key and error handling -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg&libraries=places&callback=initMap" onerror="handleGoogleMapsError()"></script>
    <script>
      // Error handler for Google Maps API loading issues
      function handleGoogleMapsError() {
        console.error('Google Maps API failed to load.');
        // If gm_authFailure hasn't been defined yet, we'll create a fallback
        if (typeof window.gm_authFailure !== 'function') {
          window.gm_authFailure = function() {
            console.error('Google Maps authentication failed.');
          };
        }
        // Trigger the auth failure manually since the script didn't load
        if (window.gm_authFailure) {
          window.gm_authFailure();
        }
      }
    </script>
  </head>
